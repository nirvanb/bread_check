<!DOCTYPE html>
<html>
<head>
    <title>Bread Selection</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 150px);
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .grid label {
            display: block;
            width: 150px;
            height: 150px;
            position: relative;
            cursor: pointer;
        }

        /* Hide checkbox */
        .grid input {
            display: none;
        }

        .grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 3px solid transparent;
            border-radius: 8px;
            transition: 0.2s;
        }

         /* When selected */

        .grid input:checked + img{
            border: 4px solid green;
            opacity: 0.7;
        }

        .grid img:hover {
            transform: scale(1.05);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h2>Select all images with bread:</h2>

<form method="POST">

    <label>Where are you from?</label>
    <input type="text" name="place" required><br><br>

    <div class="grid">
        {% for image in images %}
            <label>
                <!-- 👇 THIS is the selection box -->
                <input type="checkbox" name="bread" value="{{ image }}">

                <!-- 👇 This is what users see -->
                <img src="{{ url_for('static', filename='images/' + image) }}">
            </label>
        {% endfor %}
    </div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
